name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint with pedantic + nursery
        run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -W clippy::nursery -D warnings

      - name: Build default features
        run: cargo build --release

      - name: Build all features
        run: cargo build --release --all-features

      - name: Run tests
        run: cargo test --all-targets

      - name: Run tests with all features
        run: cargo test --all-targets --all-features

      - name: Security audit
        run: cargo audit

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(grep '^rust-version' Cargo.toml | sed 's/.*= *"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Check MSRV
        # Default features only: the optional `library` feature pulls in
        # padagonia, whose MSRV (1.85) is higher than amber's (1.80).
        run: cargo +${{ steps.msrv.outputs.version }} check --all-targets

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage (fails below 95% line coverage)
        run: cargo tarpaulin --all-targets --all-features --out Xml --fail-under 95

  fuzz:
    name: Fuzz smoke test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz config_parse (60s)
        run: cargo +nightly fuzz run config_parse -- -max_total_time=60 -print_final_stats=1

  self-analysis:
    name: Self-analysis gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build amber
        run: cargo build --release

      - name: Amber analyzes itself
        run: ./target/release/amber --format json . > amber-self.json

      - name: Upload self-analysis report
        uses: actions/upload-artifact@v4
        with:
          name: amber-self-analysis
          path: amber-self.json

      - name: Dependency-count regression check
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          count_deps() { awk '/^\[dependencies\]/{f=1;next} /^\[/{f=0} f && /^[a-zA-Z0-9_-]+[[:space:]]*=/{n++} END{print n+0}' "$1"; }
          git show "origin/${{ github.base_ref }}:Cargo.toml" > /tmp/base-Cargo.toml
          base=$(count_deps /tmp/base-Cargo.toml)
          pr=$(count_deps Cargo.toml)
          echo "Direct dependencies — base: $base, PR: $pr"
          if [ "$pr" -gt "$base" ]; then
            echo "::error::Direct dependency count increased ($base -> $pr). Amber holds its own tree to the same standard it enforces; see CONTRIBUTING.md."
            exit 1
          fi

  publish-check:
    name: crates.io publish dry-run
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish dry-run
        run: cargo publish --dry-run

  build-release:
    name: Build release binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/amber${{ matrix.suffix }}" "dist/amber-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Compute checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          sha256sum "amber-${{ matrix.target }}${{ matrix.suffix }}" > "amber-${{ matrix.target }}.sha256"

      - name: Compute checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          $hash = Get-FileHash -Algorithm SHA256 -Path "amber-${{ matrix.target }}${{ matrix.suffix }}"
          "$($hash.Hash.ToLower())  amber-${{ matrix.target }}${{ matrix.suffix }}" | Out-File -Encoding utf8 "amber-${{ matrix.target }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amber-${{ matrix.target }}
          path: dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

  release:
    name: Create GitHub release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: amber-*
          merge-multiple: true

      - name: Consolidate checksums
        shell: bash
        run: |
          cd dist
          cat *.sha256 > checksums.txt
          rm *.sha256

      - name: Generate SBOM
        shell: bash
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --all --override-filename amber-sbom
          mv amber-sbom.json dist/amber-sbom.json

      - name: Import GPG key
        if: env.GPG_PRIVATE_KEY != ''
        uses: crazy-max/ghaction-import-gpg@v6
        id: gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign checksums
        if: env.GPG_PRIVATE_KEY != ''
        shell: bash
        run: |
          cd dist
          gpg --batch --yes --armor --detach-sign -u "${{ steps.gpg.outputs.fingerprint }}" checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
